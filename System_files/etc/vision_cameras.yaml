# Camera alias/role store — managed by vision_config_manager (QGC-driven).
# Key = usbcam-<vidpid>-<serial>-i<iface> (USB descriptors; firmware-stable
# across boots, unlike /dev/v4l/by-id index numbers).
usbcam-2bc50807-CPC7B53000AB-i04:
  alias: NAV-COLOR
  role_lock: autonomy
usbcam-30c9009d-01.00.00-i00:
  alias: FPV
